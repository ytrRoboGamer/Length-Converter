<!DOCTYPE html>
<html>
  <head>
    <title>Length Converter</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <p class="title">Length Converter</p>

    <div class="text">
      <p>Length</p>
      <p>From ( Unit )</p>
      <p>To ( Unit )</p>
      <p></p>
    </div>
    
    <div class="inputs">
      <input class="numberLength" type="number" placeholder="Length">

      <select class="unitFrom">
        <option value="miles">Miles</option>
        <option value="km">KMs (kilometers)</option>
        <option value="feet">Feet</option>
      </select>

      <select class="unitTo">
        <option value="miles">Miles</option>
        <option value="km">KMs (kilometers)</option>
        <option value="feet">Feet</option>
      </select>
      
      <button class="calculateButton" onclick="
      convertLength()
      ">Calculate</button>
    </div>

    <div class="resultRow">
      <p class="result">Result = </p>
    </div>

    <pre class="notes">Please Note:
not all units are usable
you can't convert from a unit to the same unit
    </pre>

    <ul class="list">
      <p>Supported Units:</p>
      <li>km</li>
      <li>miles</li>
      <li>feet</li>
    </ul>

    <script src="javascript.js"></script>
  </body>
</html>
